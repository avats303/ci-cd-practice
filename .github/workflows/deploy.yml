name: Spring Boot Build And Deploy
on:
  push:
    branches:
      - main
env:
  IMAGE_NAME: spring-boot-app

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setting Up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Jar
        uses: mvn clean package -DskipTests

      - name: Building Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1 .

      - name: Login To DockerHub
        uses: docker/login-action@v4
        with:
          username:${{ secrets.DOCKER_USERNAME }}
          password:${{ secrets.DOCKER_TOKEN }}

      - name: Push Image To DockerHub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_SSH_KEY}}
          scripts: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1
            docker stop ${{ env.IMAGE_NAME }} || true
            docker rm ${{ env.IMAGE_NAME }} || true
            docker run -d -name spring-boot-app -- restart unless-stopped -p 8080:8081 ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1
            docker image prune -f